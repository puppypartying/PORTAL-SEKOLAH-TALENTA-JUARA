<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295"/>
      <stop offset="40%" stop-color="#E0AA3E"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgB)"/>
  <circle cx="1080" cy="500" r="220" fill="#ffffff" opacity="0.04"/>
  <circle cx="120" cy="100" r="180" fill="#E0AA3E" opacity="0.06"/>

  <!-- graduation cap -->
  <g transform="translate(600,260)">
    <ellipse cx="0" cy="0" rx="200" ry="55" fill="url(#goldB)"/>
    <ellipse cx="0" cy="0" rx="200" ry="55" fill="none" stroke="#0F172A" stroke-width="4" opacity="0.15"/>
    <rect x="-55" y="20" width="110" height="90" rx="8" fill="#0F172A" opacity="0.85"/>
    <circle cx="0" cy="0" r="14" fill="#0F172A" opacity="0.85"/>
    <path d="M170 -20 L230 -90" stroke="#0F172A" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <circle cx="232" cy="-94" r="14" fill="#0F172A" opacity="0.6"/>
  </g>

  <!-- coin / scholarship icon -->
  <g transform="translate(280,420)">
    <circle cx="0" cy="0" r="80" fill="url(#goldB)" stroke="#ffffff" stroke-width="5"/>
    <text x="0" y="22" font-family="'DM Serif Display', serif" font-size="80" fill="#0F172A" text-anchor="middle">Rp</text>
  </g>
  <g transform="translate(940,420)">
    <circle cx="0" cy="0" r="60" fill="url(#goldB)" stroke="#ffffff" stroke-width="5" opacity="0.85"/>
    <path d="M-22 5 L-6 22 L24 -16" stroke="#0F172A" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sparkle stars -->
  <g fill="#ffffff" opacity="0.5">
    <polygon points="850,120 856,138 875,138 860,150 866,168 850,157 834,168 840,150 825,138 844,138"/>
    <polygon points="220,200 226,214 241,214 229,224 234,239 220,229 206,239 211,224 199,214 214,214"/>
  </g>

  <text x="600" y="70" font-family="'DM Serif Display', serif" font-size="40" fill="#ffffff" text-anchor="middle" opacity="0.92">Beasiswa untuk Siswa Berprestasi</text>
</svg>
