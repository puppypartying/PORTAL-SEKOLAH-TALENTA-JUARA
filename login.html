<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login Admin — SMA Nusantara Unggul</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400..600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<style>
    .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }
    .login-card {
        width: 100%;
        max-width: 380px;
        background: var(--card-bg, #fff);
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 16px;
        padding: 36px 32px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .login-card h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.6rem;
        margin: 0 0 6px;
    }
    .login-card p.sub {
        font-size: 0.88rem;
        opacity: 0.65;
        margin: 0 0 28px;
    }
    .login-field { margin-bottom: 18px; }
    .login-field label {
        display: block;
        font-size: 0.82rem;
        font-weight: 500;
        margin-bottom: 6px;
    }
    .login-field input {
        width: 100%;
        padding: 11px 14px;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.15);
        font-size: 0.95rem;
        font-family: inherit;
        box-sizing: border-box;
    }
    .login-field input:focus {
        outline: none;
        border-color: var(--accent, #1E3A8A);
    }
    .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: var(--accent, #1E3A8A);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
        background: #fee2e2;
        color: #991b1b;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 18px;
        display: none;
    }
    .login-error.visible { display: block; }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 0.85rem;
        opacity: 0.6;
        text-decoration: none;
        color: inherit;
    }
</style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <h1>Login Admin</h1>
        <p class="sub">Khusus untuk pengelola data sekolah.</p>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
            <div class="login-field">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" required autocomplete="username">
            </div>
            <div class="login-field">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Masuk</button>
        </form>

        <a href="index.html" class="back-link">← Kembali ke beranda</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
    /* kalau sudah login, langsung lempar ke halaman admin */
    (async function checkExistingSession() {
        const { data } = await supabaseClient.auth.getSession();
        if (data && data.session) {
            window.location.href = 'data-akademik.html';
        }
    })();

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = document.getElementById('login-email').value.trim();
        const pass  = document.getElementById('login-pass').value;
        const errEl = document.getElementById('loginError');
        const btn   = document.getElementById('loginBtn');

        errEl.classList.remove('visible');
        btn.disabled = true;
        btn.textContent = 'Memproses...';

        const { error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: pass
        });

        btn.disabled = false;
        btn.textContent = 'Masuk';

        if (error) {
            errEl.textContent = 'Login gagal: email atau password salah.';
            errEl.classList.add('visible');
            console.error(error);
            return;
        }

        window.location.href = 'data-akademik.html';
    });
</script>

</body>
</html>
