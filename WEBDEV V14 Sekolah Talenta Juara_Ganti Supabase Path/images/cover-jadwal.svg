<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgJ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="goldJ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295"/>
      <stop offset="40%" stop-color="#E0AA3E"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgJ)"/>
  <circle cx="1080" cy="100" r="200" fill="#ffffff" opacity="0.04"/>
  <circle cx="120" cy="540" r="220" fill="#E0AA3E" opacity="0.06"/>

  <!-- calendar -->
  <g transform="translate(340,90)">
    <rect x="0" y="0" width="520" height="430" rx="20" fill="#ffffff" opacity="0.97"/>
    <rect x="0" y="0" width="520" height="90" rx="20" fill="url(#goldJ)"/>
    <rect x="0" y="60" width="520" height="30" fill="url(#goldJ)"/>
    <!-- rings -->
    <rect x="60" y="-20" width="18" height="60" rx="9" fill="#1E3A8A"/>
    <rect x="442" y="-20" width="18" height="60" rx="9" fill="#1E3A8A"/>
    <text x="260" y="55" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="#0F172A" text-anchor="middle">JULI 2025</text>

    <!-- grid of dates -->
    <g font-family="Inter, sans-serif" font-size="22" fill="#334155" text-anchor="middle">
      <!-- 6 columns x 5 rows -->
      <g transform="translate(50,150)">
        <text x="0" y="0">M</text><text x="80" y="0">S</text><text x="160" y="0">S</text><text x="240" y="0">R</text><text x="320" y="0">K</text><text x="400" y="0">J</text>
      </g>
      <g transform="translate(50,210)" opacity="0.55">
        <text x="0" y="0">1</text><text x="80" y="0">2</text><text x="160" y="0">3</text><text x="240" y="0">4</text><text x="320" y="0">5</text><text x="400" y="0">6</text>
      </g>
      <g transform="translate(50,260)">
        <text x="0" y="0">7</text><text x="80" y="0">8</text><text x="160" y="0">9</text><text x="240" y="0">10</text><text x="320" y="0">11</text><text x="400" y="0">12</text>
      </g>
      <g transform="translate(50,310)">
        <text x="0" y="0">13</text>
        <circle cx="80" cy="-8" r="26" fill="url(#goldJ)"/>
        <text x="80" y="0" font-weight="700" fill="#0F172A">14</text>
        <text x="160" y="0">15</text><text x="240" y="0">16</text><text x="320" y="0">17</text><text x="400" y="0">18</text>
      </g>
      <g transform="translate(50,360)">
        <text x="0" y="0">19</text><text x="80" y="0">20</text><text x="160" y="0">21</text><text x="240" y="0">22</text><text x="320" y="0">23</text><text x="400" y="0">24</text>
      </g>
    </g>
  </g>

  <text x="600" y="80" font-family="'DM Serif Display', serif" font-size="40" fill="#ffffff" text-anchor="middle" opacity="0.0"> </text>

  <!-- floating badge -->
  <g transform="translate(870,400)">
    <rect x="-90" y="-35" width="180" height="70" rx="35" fill="url(#goldJ)"/>
    <text x="0" y="8" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">Tahun Ajaran Baru</text>
  </g>
</svg>
